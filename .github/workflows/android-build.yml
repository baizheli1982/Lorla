name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            host: aarch64-linux-android
          - arch: armeabi-v7a
            host: arm-linux-androideabi

    steps:
    - name: Checkout overlay
      uses: actions/checkout@v4

    - name: Clone Kodi 21.3-Omega
      run: |
        git clone --depth 1 --branch 21.3-Omega https://github.com/xbmc/xbmc.git /tmp/kodi

    - name: Clone skin dependencies
      working-directory: /tmp/kodi/addons
      run: |
        git clone --depth 1 --branch omega https://github.com/jurialmunkey/skin.arctic.fuse.3.git skin.arctic.fuse.3
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/script.skinvariables.git script.skinvariables
        git clone --depth 1 https://github.com/jurialmunkey/script.texturemaker.git script.texturemaker
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/plugin.video.themoviedb.helper.git plugin.video.themoviedb.helper
        git clone --depth 1 https://github.com/jurialmunkey/resource.font.robotocjksc.git resource.font.robotocjksc
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.weathericons.white.git resource.images.weathericons.white
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.studios.coloured.git resource.images.studios.coloured

    - name: Apply overlay
      run: cp -rf overlay/* /tmp/kodi/

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;33.0.1 ndk;21.4.7075529 platform-tools'

    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          autoconf automake bison build-essential curl flex gawk git gperf \
          lib32stdc++6 lib32z1 lib32z1-dev libcurl4-openssl-dev unzip zip zlib1g-dev \
          python3-dev python3-setuptools nasm cmake ninja-build meson pkg-config \
          libglib2.0-dev

    - name: Create debug keystore
      run: |
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore \
          -alias androiddebugkey -storepass android -keypass android \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US" || true

    - name: Cache tarballs
      uses: actions/cache@v4
      with:
        path: ~/android-tarballs
        key: kodi-tarballs-v3-${{ hashFiles('.github/workflows/android-build.yml') }}
        restore-keys: kodi-tarballs-v3-

    - name: Bootstrap depends
      working-directory: /tmp/kodi/tools/depends
      run: ./bootstrap

    - name: Configure depends
      working-directory: /tmp/kodi/tools/depends
      run: |
        ./configure \
          --with-tarballs=$HOME/android-tarballs \
          --host=${{ matrix.host }} \
          --with-sdk-path=$ANDROID_SDK_ROOT \
          --with-ndk-path=$ANDROID_SDK_ROOT/ndk/21.4.7075529 \
          --prefix=$PWD/xbmc-depends \
          --disable-debug

    - name: Build native depends
      working-directory: /tmp/kodi/tools/depends
      run: make -j$(nproc) -C native

    - name: Build target depends
      working-directory: /tmp/kodi/tools/depends
      run: make -j$(nproc) -C target

    - name: Build binary addons
      working-directory: /tmp/kodi
      run: make -j$(nproc) -C tools/depends/target/binary-addons

    - name: Configure XBMC
      working-directory: /tmp/kodi
      run: make -C tools/depends/target/cmakebuildsys

    - name: Build XBMC
      working-directory: /tmp/kodi
      run: |
        cd build
        make -j$(nproc) || make

    - name: Package APK
      working-directory: /tmp/kodi
      run: |
        cd build
        make apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kodi-lorla-${{ matrix.arch }}
        path: /tmp/kodi/kodiapp*.apk
        retention-days: 30
