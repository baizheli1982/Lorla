name: Build Lorla (Kodi 21 Omega + Arctic Fuse 3)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  android:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            host: aarch64-linux-android
          - arch: armeabi-v7a
            host: arm-linux-androideabi

    steps:
    - name: Checkout overlay
      uses: actions/checkout@v4

    - name: Clone Kodi 21.3-Omega
      run: |
        git clone --depth 1 --branch 21.3-Omega https://github.com/xbmc/xbmc.git /tmp/kodi

    - name: Clone skin dependencies
      working-directory: /tmp/kodi
      run: |
        git clone --depth 1 --branch omega https://github.com/jurialmunkey/skin.arctic.fuse.3.git addons/skin.arctic.fuse.3
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/script.skinvariables.git addons/script.skinvariables
        git clone --depth 1 https://github.com/jurialmunkey/script.texturemaker.git addons/script.texturemaker
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/plugin.video.themoviedb.helper.git addons/plugin.video.themoviedb.helper
        git clone --depth 1 https://github.com/jurialmunkey/resource.font.robotocjksc.git addons/resource.font.robotocjksc
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.weathericons.white.git addons/resource.images.weathericons.white
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.studios.coloured.git addons/resource.images.studios.coloured

    - name: Apply overlay
      run: |
        cp -rf overlay/* /tmp/kodi/
        cp -rf overlay/addons/* /tmp/kodi/addons/ 2>/dev/null || true

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;33.0.1 ndk;21.4.7075529 platform-tools'

    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          autoconf automake bison build-essential curl flex gawk git gperf \
          lib32stdc++6 lib32z1 lib32z1-dev libcurl4-openssl-dev unzip zip zlib1g-dev \
          python3-dev python3-setuptools nasm cmake ninja-build meson pkg-config \
          libglib2.0-dev

    - name: Create debug keystore
      run: |
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore \
          -alias androiddebugkey -storepass android -keypass android \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US" || true

    - name: Cache tarballs
      uses: actions/cache@v4
      with:
        path: ~/android-tarballs
        key: kodi-tarballs-v3-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: kodi-tarballs-v3-

    - name: Bootstrap depends
      working-directory: /tmp/kodi/tools/depends
      run: ./bootstrap

    - name: Configure depends
      working-directory: /tmp/kodi/tools/depends
      run: |
        ./configure \
          --with-tarballs=$HOME/android-tarballs \
          --host=${{ matrix.host }} \
          --with-sdk-path=$ANDROID_SDK_ROOT \
          --with-ndk-path=$ANDROID_SDK_ROOT/ndk/21.4.7075529 \
          --prefix=$PWD/xbmc-depends \
          --disable-debug

    - name: Build native depends
      working-directory: /tmp/kodi/tools/depends
      run: make -j$(nproc) -C native

    - name: Build target depends
      working-directory: /tmp/kodi/tools/depends
      run: make -j$(nproc) -C target

    - name: Build binary addons
      working-directory: /tmp/kodi
      run: make -j$(nproc) -C tools/depends/target/binary-addons

    - name: Configure XBMC
      working-directory: /tmp/kodi
      run: make -C tools/depends/target/cmakebuildsys

    - name: Build XBMC
      working-directory: /tmp/kodi
      run: |
        cd build
        make -j$(nproc) || make

    - name: Package APK
      working-directory: /tmp/kodi
      run: |
        cd build
        make apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kodi-lorla-${{ matrix.arch }}
        path: /tmp/kodi/kodiapp*.apk
        retention-days: 30

  windows:
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
    - name: Checkout overlay
      uses: actions/checkout@v4

    - name: Clone Kodi 21.3-Omega
      shell: bash
      run: git clone --depth 1 --branch 21.3-Omega https://github.com/xbmc/xbmc.git /d/kodi

    - name: Clone skin dependencies (Windows)
      shell: bash
      run: |
        cd /d/kodi
        mkdir -p project/addons
        cd project/addons
        git clone --depth 1 --branch omega https://github.com/jurialmunkey/skin.arctic.fuse.3.git skin.arctic.fuse.3
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/script.skinvariables.git script.skinvariables
        git clone --depth 1 https://github.com/jurialmunkey/script.texturemaker.git script.texturemaker
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/plugin.video.themoviedb.helper.git plugin.video.themoviedb.helper
        git clone --depth 1 https://github.com/jurialmunkey/resource.font.robotocjksc.git resource.font.robotocjksc
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.weathericons.white.git resource.images.weathericons.white
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.studios.coloured.git resource.images.studios.coloured

    - name: Apply overlay (Windows)
      shell: bash
      run: |
        cd /d/kodi
        WS=$(cygpath -u "$GITHUB_WORKSPACE" 2>/dev/null || echo "$GITHUB_WORKSPACE" | sed 's|\\|/|g' | sed 's|^\([A-Z]\):|/\1|')
        cp -rf "$WS/overlay/"* .
        cp -rf "$WS/overlay/addons/"* project/addons/ 2>/dev/null || true

    - name: Configure (CMake + Visual Studio 2022)
      shell: cmd
      run: |
        cd /d D:\kodi
        cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DENABLE_INTERNAL_FFMPEG=ON

    - name: Build Kodi
      shell: cmd
      run: |
        cd /d D:\kodi
        cmake --build build --config Release -j %NUMBER_OF_PROCESSORS%

    - name: Package (install + zip)
      shell: cmd
      run: |
        cd /d D:\kodi
        cmake --install build --config Release --prefix D:\kodi-install
        cd /d D:\kodi-install
        tar -czf D:\kodi-lorla-win64.tar.gz *

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: kodi-lorla-win64
        path: D:\kodi-lorla-win64.tar.gz
        retention-days: 30

  apple:
    runs-on: macos-14
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            name: macos-arm64
            package: dmg
            ext: dmg
          - platform: tvos
            name: tvos
            package: deb
            ext: deb
          - platform: ios
            name: ios
            package: deb
            ext: deb

    steps:
    - name: Checkout overlay
      uses: actions/checkout@v4

    - name: Clone Kodi 21.3-Omega
      run: |
        git clone --depth 1 --branch 21.3-Omega https://github.com/xbmc/xbmc.git /tmp/kodi

    - name: Clone skin dependencies
      working-directory: /tmp/kodi
      run: |
        git clone --depth 1 --branch omega https://github.com/jurialmunkey/skin.arctic.fuse.3.git addons/skin.arctic.fuse.3
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/script.skinvariables.git addons/script.skinvariables
        git clone --depth 1 https://github.com/jurialmunkey/script.texturemaker.git addons/script.texturemaker
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/plugin.video.themoviedb.helper.git addons/plugin.video.themoviedb.helper
        git clone --depth 1 https://github.com/jurialmunkey/resource.font.robotocjksc.git addons/resource.font.robotocjksc
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.weathericons.white.git addons/resource.images.weathericons.white
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.studios.coloured.git addons/resource.images.studios.coloured

    - name: Apply overlay
      run: |
        cp -rf overlay/* /tmp/kodi/
        cp -rf overlay/addons/* /tmp/kodi/addons/ 2>/dev/null || true

    - name: Bootstrap depends
      working-directory: /tmp/kodi/tools/depends
      run: ./bootstrap

    - name: Configure depends
      working-directory: /tmp/kodi/tools/depends
      run: |
        ./configure \
          --host=aarch64-apple-darwin \
          --with-platform=${{ matrix.platform }} \
          --prefix=$PWD/xbmc-depends \
          --disable-debug

    - name: Set up Xcode version
      run: |
        sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
        xcodebuild -version

    - name: Build native depends (Apple)
      working-directory: /tmp/kodi/tools/depends
      run: make -j$(sysctl -n hw.ncpu) -C native

    - name: Build target depends
      working-directory: /tmp/kodi/tools/depends
      run: make -j$(sysctl -n hw.ncpu) -C target

    - name: Build binary addons (Apple)
      working-directory: /tmp/kodi
      run: make -j$(sysctl -n hw.ncpu) -C tools/depends/target/binary-addons

    - name: Configure XBMC (Apple)
      working-directory: /tmp/kodi
      run: |
        export SDKROOT=$(xcrun --show-sdk-path)
        make -C tools/depends/target/cmakebuildsys \
          CMAKE_EXTRA_ARGUMENTS="-DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 -DCMAKE_OSX_SYSROOT=$SDKROOT -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY"

    - name: Build XBMC (Apple)
      working-directory: /tmp/kodi
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu) || make

    - name: Package
      working-directory: /tmp/kodi
      run: |
        cd build
        make ${{ matrix.package }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kodi-lorla-${{ matrix.name }}
        path: /tmp/kodi/*.${{ matrix.ext }}
        retention-days: 30

  raspberry:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: armhf
            host: arm-linux-gnueabihf
          - arch: arm64
            host: aarch64-linux-gnu

    steps:
    - name: Checkout overlay
      uses: actions/checkout@v4

    - name: Install cross-compilers
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          autoconf automake bison build-essential curl flex gawk git gperf \
          unzip zip zlib1g-dev python3-dev python3-setuptools nasm cmake \
          ninja-build meson pkg-config libglib2.0-dev \
          crossbuild-essential-armhf crossbuild-essential-arm64

    - name: Clone Kodi
      run: git clone --depth 1 --branch 21.3-Omega https://github.com/xbmc/xbmc.git /tmp/kodi

    - name: Clone skin dependencies
      working-directory: /tmp/kodi
      run: |
        git clone --depth 1 --branch omega https://github.com/jurialmunkey/skin.arctic.fuse.3.git addons/skin.arctic.fuse.3
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/script.skinvariables.git addons/script.skinvariables
        git clone --depth 1 https://github.com/jurialmunkey/script.texturemaker.git addons/script.texturemaker
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/plugin.video.themoviedb.helper.git addons/plugin.video.themoviedb.helper
        git clone --depth 1 https://github.com/jurialmunkey/resource.font.robotocjksc.git addons/resource.font.robotocjksc
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.weathericons.white.git addons/resource.images.weathericons.white
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.studios.coloured.git addons/resource.images.studios.coloured

    - name: Apply overlay
      run: |
        cp -rf overlay/* /tmp/kodi/
        cp -rf overlay/addons/* /tmp/kodi/addons/ 2>/dev/null || true

    - name: Bootstrap depends
      working-directory: /tmp/kodi/tools/depends
      run: ./bootstrap

    - name: Configure depends (RPi)
      working-directory: /tmp/kodi/tools/depends
      run: |
        ./configure \
          --host=${{ matrix.host }} \
          --with-rendersystem=gles \
          --prefix=$PWD/xbmc-depends \
          --disable-debug

    - name: Build all depends (RPi)
      working-directory: /tmp/kodi/tools/depends
      run: make -j$(nproc) CMAKE_EXE=/usr/bin/cmake

    - name: Build binary addons
      working-directory: /tmp/kodi
      run: make -j$(nproc) -C tools/depends/target/binary-addons

    - name: Configure XBMC
      working-directory: /tmp/kodi
      run: make -C tools/depends/target/cmakebuildsys

    - name: Build
      working-directory: /tmp/kodi
      run: |
        cd build
        make -j$(nproc) || make

    - name: Package (make install + tar.gz)
      run: |
        cd /tmp/kodi/build
        make install DESTDIR=/tmp/kodi-install
        cd /tmp/kodi-install
        tar czf /tmp/kodi-lorla-rpi-${{ matrix.arch }}.tar.gz .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kodi-lorla-rpi-${{ matrix.arch }}
        path: /tmp/kodi-lorla-rpi-${{ matrix.arch }}.tar.gz
        retention-days: 30
