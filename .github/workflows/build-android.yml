name: Build Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            host: aarch64-linux-android
            strip_cmd: aarch64-linux-android-strip
          - arch: armeabi-v7a
            host: arm-linux-androideabi
            strip_cmd: arm-linux-androideabi-strip

    steps:
    - name: Checkout overlay
      uses: actions/checkout@v4

    - name: Clone Kodi 21.3-Omega
      run: git clone --depth 1 --branch 21.3-Omega https://github.com/xbmc/xbmc.git /tmp/kodi

    - name: Clone skin dependencies
      working-directory: /tmp/kodi
      run: |
        git clone --depth 1 --branch omega https://github.com/jurialmunkey/skin.arctic.fuse.3.git addons/skin.arctic.fuse.3
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/script.skinvariables.git addons/script.skinvariables
        git clone --depth 1 https://github.com/jurialmunkey/script.texturemaker.git addons/script.texturemaker
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/plugin.video.themoviedb.helper.git addons/plugin.video.themoviedb.helper
        git clone --depth 1 https://github.com/jurialmunkey/resource.font.robotocjksc.git addons/resource.font.robotocjksc
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.weathericons.white.git addons/resource.images.weathericons.white
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.studios.coloured.git addons/resource.images.studios.coloured

    - name: Apply overlay
      run: |
        cp -rf overlay/* /tmp/kodi/
        cp -rf overlay/addons/* /tmp/kodi/addons/ 2>/dev/null || true

    - name: Download Chinese font
      run: |
        # 下载开源的思源黑体（支持中文），约5MB
        wget -q "https://github.com/adobe-fonts/source-han-sans/raw/release/OTF/SimplifiedChinese/SourceHanSansSC-Regular.otf" -O /tmp/cnfont.otf 2>/dev/null || \
        wget -q "https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/OTF/SimplifiedChinese/NotoSansCJKsc-Regular.otf" -O /tmp/cnfont.otf 2>/dev/null || \
        cp /tmp/cnfont.otf /tmp/kodi/addons/skin.arctic.fuse.3/fonts/arial.ttf 2>/dev/null || true
        echo "Chinese font installed"

    - name: Merge Python modules (fix jurialmunkey/PIL path)
      run: |
        KODI=/tmp/kodi
        cd /tmp
        git clone --depth 1 https://github.com/jurialmunkey/script.module.jurialmunkey.git
        git clone --depth 1 https://github.com/jurialmunkey/script.module.infotagger.git
        pip3 install --target /tmp/pil-deps Pillow

        # 合并到 skinvariables
        cp -r script.module.jurialmunkey/resources/modules/jurialmunkey $KODI/addons/script.skinvariables/resources/lib/
        cp -r script.module.infotagger/resources/modules/infotagger $KODI/addons/script.skinvariables/resources/lib/
        cp -r /tmp/pil-deps/* $KODI/addons/script.skinvariables/resources/lib/

        # 合并到 tmdbhelper
        TMDBLIB=$(find $KODI/addons/plugin.video.themoviedb.helper -type d -name "tmdbhelper" | head -1)/lib
        cp -r script.module.jurialmunkey/resources/modules/jurialmunkey $TMDBLIB/
        cp -r script.module.infotagger/resources/modules/infotagger $TMDBLIB/
        cp -r /tmp/pil-deps/* $TMDBLIB/

        # sys.path 补丁
        for pyfile in $(grep -rl "import jurialmunkey\|import infotagger\|import PIL" $KODI/addons/script.skinvariables/resources/lib/ 2>/dev/null); do
          sed -i '1i import sys, os\nsys.path.insert(0, os.path.dirname(os.path.abspath(__file__)))' "$pyfile"
        done
        echo "Python modules merged"

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;33.0.1 ndk;21.4.7075529 platform-tools'

    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq autoconf automake bison build-essential curl flex gawk git gperf lib32stdc++6 lib32z1 lib32z1-dev libcurl4-openssl-dev unzip zip zlib1g-dev python3-dev python3-setuptools nasm cmake ninja-build meson pkg-config libglib2.0-dev

    - name: Create debug keystore
      run: |
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true

    - name: Bootstrap depends
      working-directory: /tmp/kodi/tools/depends
      run: ./bootstrap

    - name: Configure depends
      working-directory: /tmp/kodi/tools/depends
      run: |
        ./configure \
          --with-tarballs=$HOME/android-tarballs \
          --host=${{ matrix.host }} \
          --with-sdk-path=$ANDROID_SDK_ROOT \
          --with-ndk-path=$ANDROID_SDK_ROOT/ndk/21.4.7075529 \
          --with-ffmpeg-options="--disable-everything --enable-decoder=h264,hevc,vp9,mpeg4 --enable-parser=h264,hevc,vp9 --enable-decoder=aac,ac3,mp3,flac --enable-demuxer=mov,matroska,flv,mp3,aac --enable-protocol=file,http,https,tcp,udp,rtmp" \
          --prefix=$PWD/xbmc-depends \
          --disable-debug

    - name: Build native depends
      working-directory: /tmp/kodi/tools/depends
      run: make -j$(nproc) -C native

    - name: Build target depends
      working-directory: /tmp/kodi/tools/depends
      run: make -j$(nproc) -C target

    - name: Build binary addons
      working-directory: /tmp/kodi
      run: make -j$(nproc) -C tools/depends/target/binary-addons ADDONS_BUILD="audioencoder.kodi.builtin.aac audioencoder.kodi.builtin.wma" || true

    - name: Configure XBMC
      working-directory: /tmp/kodi
      run: make -C tools/depends/target/cmakebuildsys

    - name: Build XBMC
      working-directory: /tmp/kodi
      run: cd build && make -j$(nproc) || make

    - name: Strip debug symbols
      run: |
        find /tmp/kodi/addons -name "*.so" -exec ${{ matrix.strip_cmd }} --strip-unneeded {} \; 2>/dev/null || true
        find /tmp/kodi/build -name "*.so" -exec ${{ matrix.strip_cmd }} --strip-unneeded {} \; 2>/dev/null || true

    - name: Package APK
      working-directory: /tmp/kodi
      run: cd build && make apk

    - name: Upload APK (GitHub)
      uses: actions/upload-artifact@v4
      with:
        name: kodi-lorla-${{ matrix.arch }}
        path: /tmp/kodi/kodiapp*.apk
        retention-days: 30

    - name: Upload to Gitee Release
      if: env.GITEE_TOKEN != ''
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        APK=$(ls /tmp/kodi/kodiapp*.apk | head -1)
        echo "Uploading to Gitee..."
        curl -s -X POST "https://gitee.com/api/v5/repos/bai-zheli/lorla/releases" \
          -H "Content-Type: application/json" \
          -d "{\"access_token\":\"$GITEE_TOKEN\",\"tag_name\":\"android-${{ matrix.arch }}-$(date +%Y%m%d%H%M)\",\"name\":\"Lorla Android ${{ matrix.arch }}\",\"body\":\"$(date +%Y-%m-%d) 自动编译\",\"target_commitish\":\"main\"}"
      continue-on-error: true
