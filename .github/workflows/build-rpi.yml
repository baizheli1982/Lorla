name: Build Raspberry Pi
on: workflow_dispatch
jobs:
  rpi:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: armhf
            host: arm-linux-gnueabihf
          - arch: arm64
            host: aarch64-linux-gnu
    steps:
    - uses: actions/checkout@v4
    - run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq autoconf automake bison build-essential curl flex gawk git gperf unzip zip zlib1g-dev python3-dev python3-setuptools nasm cmake ninja-build meson pkg-config libglib2.0-dev gperf crossbuild-essential-armhf crossbuild-essential-arm64
    - run: git clone --depth 1 --branch 21.3-Omega https://github.com/xbmc/xbmc.git /tmp/kodi
    - working-directory: /tmp/kodi
      run: |
        git clone --depth 1 --branch omega https://github.com/jurialmunkey/skin.arctic.fuse.3.git addons/skin.arctic.fuse.3
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/script.skinvariables.git addons/script.skinvariables
        git clone --depth 1 https://github.com/jurialmunkey/script.texturemaker.git addons/script.texturemaker
        git clone --depth 1 --branch nexus https://github.com/jurialmunkey/plugin.video.themoviedb.helper.git addons/plugin.video.themoviedb.helper
        git clone --depth 1 https://github.com/jurialmunkey/resource.font.robotocjksc.git addons/resource.font.robotocjksc
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.weathericons.white.git addons/resource.images.weathericons.white
        git clone --depth 1 https://github.com/XBMC-Addons/resource.images.studios.coloured.git addons/resource.images.studios.coloured
    - run: cp -rf overlay/* /tmp/kodi/ && cp -rf overlay/addons/* /tmp/kodi/addons/ 2>/dev/null || true
    - working-directory: /tmp/kodi/tools/depends
      run: |
        make distclean 2>/dev/null || true
        ./bootstrap
        export PKG_CONFIG_PATH=""
        export PKG_CONFIG_LIBDIR="/usr/lib/${{ matrix.host }}/pkgconfig:/usr/share/pkgconfig"
        export PKG_CONFIG_SYSROOT_DIR="/"
        ./configure --host=${{ matrix.host }} --with-rendersystem=gles --disable-vlc --disable-vdpau --prefix=$PWD/xbmc-depends --disable-debug
    - working-directory: /tmp/kodi/tools/depends
      run: make -j$(nproc) -C native
    - working-directory: /tmp/kodi/tools/depends
      run: make -j$(nproc) -C target
    - working-directory: /tmp/kodi
      run: make -j$(nproc) -C tools/depends/target/binary-addons
    - working-directory: /tmp/kodi
      run: make -C tools/depends/target/cmakebuildsys
    - working-directory: /tmp/kodi
      run: cd build && make -j$(nproc) || make
    - run: |
        cd /tmp/kodi/build && make install DESTDIR=/tmp/kodi-install
        cd /tmp/kodi-install && tar czf /tmp/kodi-lorla-rpi-${{ matrix.arch }}.tar.gz .
    - uses: actions/upload-artifact@v4
      with:
        name: kodi-lorla-rpi-${{ matrix.arch }}
        path: /tmp/kodi-lorla-rpi-${{ matrix.arch }}.tar.gz
        retention-days: 30
